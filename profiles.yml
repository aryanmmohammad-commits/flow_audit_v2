# Copy to ~/.dbt/profiles.yml (or keep here and run `dbt --profiles-dir .`).
# DuckDB is the default. Switching to BigQuery is the single block change below.
flow_audit:
  target: duckdb
  outputs:

    duckdb:
      type: duckdb
      path: flow_audit.duckdb
      threads: 4

    # --- swap target to 'bigquery' above to run on the cloud warehouse ---
    bigquery:
      type: bigquery
      method: oauth          # or service-account with keyfile
      project: your-gcp-project
      dataset: flow_audit
      location: EU
      threads: 4
